name: Build Minecraft Plugin 1.21.1

on:
  push:
    branches: [ "main", "master" ] # Сработает на любой из этих веток

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21 # Важно для 1.21.1!
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Upload Plugin Jar
      uses: actions/upload-artifact@v4
      with:
        name: MyPlugin-1.21.1
        path: target/*.jar
